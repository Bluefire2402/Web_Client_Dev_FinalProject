<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mabel Music Store - Product Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="Styles.CSS">
</head>
<body>

<header>
    <nav class="navbar">
        <h1>Mabel Music Store</h1>
        <ul class="menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Shop</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="Login.html">Login</a></li>
            <li><a href="Register.html">Register</a></li>
            <li><a href="Profile.html">Profile</a></li>
            <li><a href="Cart.html">Cart</a></li>
        </ul>
    </nav>
</header>

<div class="container mt-5">
    <h2 id="name"></h2>
    <p id="price"></p>
    <p id="desc"></p>
    <img id="img" class="img-fluid rounded shadow" width="300">
    <br><br>
    <label>Quantity:</label>
    <input type="number" id="quantity" value = "1" min = "1">
    <p class="mt-2">Total: <span id="total"></span></p>
    <button class="btn btn-primary" onclick="addToCart()">Add to Cart</button>
</div>

<script>
const products = [
    { id: 1, name: "Fender Stratocaster", price: 850, desc: "Classic guitar for rock and alternative", img: "Stratocaster.jpg"},
    { id: 2, name: "Gibson Les Paul", price: 1200, desc: "Perfect for any genre", img: "LesPaul (1).jpg"},
    { id: 3, name: "Ibanez RG550", price: 900, desc: "Great for metal", img: "Ibanez.jpg"},
    { id: 4, name: "Yamaha Pacifica 112V", price: 300, desc: "Cheap and versatile", img: "Yamaha.jpg"},
    { id: 5, name: "Taylor 214ce Acoustic", price: 1000, desc: "High quality acoustic guitar", img: "Taylor.jpg"},
    { id: 6, name: "Fender Precision Bass", price: 800, desc: "Classic bass sound", img: "Fender.jpg"},
    { id: 7, name: "Music Man StingRay", price: 1100, desc: "Powerful bass for rock", img: "MusicMan.jpg"},
    { id: 8, name: "Ibanez SR300", price: 350, desc: "Lightweight bass", img: "Ibanezs bass.jpg"},
    { id: 9, name: "Pearl Export Drum Kit", price: 500, desc: "Popular drum kit", img: "Pearl.jpg"},
    { id: 10, name: "Roland TD-17", price: 900, desc: "Electronic drum kit", img: "Roland.jpg"},
    { id: 11, name: "Yamaha Stage Custom", price: 1000, desc: "Professional drum set", img: "YamahaDrums.jpg"},
    { id: 12, name: "Yamaha P-45", price: 600, desc: "Digital piano", img: "Yamaha keys.jpg"},
    { id: 13, name: "Roland JUNO-DS61", price: 800, desc: "Keyboard for performance", img: "RolandKeys.jpg"},
    { id: 14, name: "Shure SM58", price: 120, desc: "Professional microphone", img: "Shure.jpg"},
    { id: 15, name: "Focusrite Scarlett 2i2", price: 200, desc: "Audio interface", img: "Scarlet (4).jpg"}
];
const params = new URLSearchParams(window.location.search);
const productId = parseInt(params.get("id"));
const product = products.find(p => p.id === productId);
if (product) {
    document.getElementById("name").textContent = product.name;
    document.getElementById("price").textContent = "$" + product.price.toFixed(2);
    document.getElementById("desc").textContent = product.desc;
    document.getElementById("img").src = product.img;
} else {
    document.getElementById("name").textContent = "The product was not found";
}
function addToCart() {
    const quantity = document.getElementById("quantity").value;
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    cart.push({
        id: product.id,
        name: product.name,
        price: product.price,
        quantity: quantity
    });
    localStorage.setItem("cart", JSON.stringify(cart));
    alert("The product was added to the cart");
}
</script>
</body>
</html>

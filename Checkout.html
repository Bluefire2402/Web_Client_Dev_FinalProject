    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="Styles.CSS">
</head>
<body>
<header>
    <nav class="navbar bg-dark px-4">
        <a class="navbar-brand d-flex align-items-center logo-text" href="index.html">
        <img src="images/Logo.jpg" alt="Logo" class="logo-img me-2"> Mabel Music Store</a>
        <ul class="menu d-flex gap-3 list-unstyled m-0">
            <button onclick="Darkmode()" class="btn btn-secondary">
            Dark Mode
            </button>
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Shop</a></li>
            <li><a href="Cart.html" >Cart</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>

        </ul>
    </nav>
</header>

<div class="container mt-5">
    <h1>Checkout</h1>
    <h3>Billing Information</h3>
    <label>Name:</label>
    <input type="text" id="name" class="form-control mb-3">
    <label>Address:</label>
    <input type="text" id="address" class="form-control mb-3">
    <label>Payment Method:</label>
    <select id="payment" class="form-control mb-3">
        <option value="">Select</option>
        <option>Credit Card</option>
        <option>Debit Card</option>
    </select>
    <h3>Order Summary</h3>
    <div id="summary"></div>
    <h4>Total: <span id="total"></span></h4>
    <button class="btn btn-success mt-3" onclick="placeOrder()">Place Order</button>
</div>

<script src="Js/checkout.js"></script>
</body>
<footer class="bg-dark text-white mt-5 py-4">

      </div>

      </div>

      </div>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mabel Music Store - Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="Styles.CSS">
</head>
<body>
<header>
    <nav class="navbar bg-dark px-4">
        <h1 class="text-white">Mabel Music Store</h1>
        <ul class="menu d-flex gap-3 list-unstyled m-0">
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Shop</a></li>
            <li><a href="Cart.html" >Cart</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="Login.html">Login</a></li>
            <li><a href="Register.html">Register</a></li>
            <li><a href="Profile.html">Profile</a></li>
            <li><a href="Cart.html">Cart</a></li>
        </ul>
    </nav>
</header>
<div class="container mt-5">
    <h2>Your Cart</h2>
    <div id="cart"></div>

    <h3 class="mt-4">Total: <span id="total"></span></h3>
</div>
<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
const cartDiv = document.getElementById("cart");
const totalDiv = document.getElementById("total");
function displayCart() {
    cartDiv.innerHTML = "";
    let total = 0;
    if (cart.length === 0) {
        cartDiv.innerHTML = "<p>Your cart is empty.</p>";
        totalDiv.textContent = "$0";
        return;
    }
    cart.forEach((item, index) => {
        const itemTotal = item.price * item.quantity;
        total += itemTotal;

        cartDiv.innerHTML += `
            <div class="card p-3 mb-3">
                <h4>${item.name}</h4>
                <p>Price: $${item.price}</p>

                <label>Quantity:</label>
                <input type="number" value="${item.quantity}" min="1"
                    onchange="updateQuantity(${index}, this.value)">

                <p>Total: $${itemTotal}</p>

                <button class="btn btn-danger"
                    onclick="removeItem(${index})">Remove</button>
            </div>
        `;
    });
    totalDiv.textContent = "$" + total;
}
function removeItem(index) {
    cart.splice(index, 1);
    localStorage.setItem("cart", JSON.stringify(cart));
    displayCart();
}

function updateQuantity(index, newQuantity) {
    cart[index].quantity = parseInt(newQuantity);
    localStorage.setItem("cart", JSON.stringify(cart));
    displayCart();
}
displayCart();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mabel Music Store - Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="Styles.CSS">
</head>

<body>

<header>
    <nav class="navbar bg-dark px-4">
        <h1 class="text-white">Mabel Music Store</h1>
        <ul class="menu d-flex gap-3 list-unstyled m-0">
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Shop</a></li>
            <li><a href="Cart.html" >Cart</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="Login.html">Login</a></li>
            <li><a href="Register.html">Register</a></li>
            <li><a href="Profile.html">Profile</a></li>
            <li><a href="Cart.html">Cart</a></li>
        </ul>
    </nav>
</header>

<div class="container mt-5">
    <h2>Your Profile</h2>
    <div id="profile-info"></div>
    <hr>
    <h4>Update Info</h4>
    <label>Name:</label>
    <input type="text" id="name" class="form-control mb-3">
    <label>Email:</label>
    <input type="email" id="email" class="form-control mb-3">
    <button class="btn btn-primary" onclick="updateProfile()">Update</button>
    <button class="btn btn-danger mt-3" onclick="logout()">Logout</button>
</div>

<script>
let user = JSON.parse(localStorage.getItem("user"));
const profileDiv = document.getElementById("profile-info");
function displayProfile() {
    if (!user) {
        profileDiv.innerHTML = "<p>No users are logged.</p>";
        return;
    }
    profileDiv.innerHTML = `
        <p><strong>Name:</strong> ${user.name || "n/a"}</p>
        <p><strong>Email:</strong> ${user.email}</p>
    `;
    document.getElementById("name").value = user.name || "";
    document.getElementById("email").value = user.email;
}

function updateProfile() {
    const newName = document.getElementById("name").value.trim();
    const newEmail = document.getElementById("email").value.trim();
    if (!newEmail) {
        alert("Email cannot be empty!");
        return;
    }
    user.name = newName;
    user.email = newEmail;
    localStorage.setItem("user", JSON.stringify(user));
    alert("Profile updated!");
    displayProfile();
}
function logout() {
    localStorage.removeItem("user");
    alert("Logged out!");
    window.location.href = "login.html";
}
displayProfile();
</script>
</body>
</html>
